<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nuestro Jardín de Girasoles 🌻 - 5 de Junio 2023</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #c8e8ff 0%, #9fc8e8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Dancing Script', 'Pacifico', 'Poppins', cursive, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor principal */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 1300px;
            height: 100vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Área del canvas principal */
        .canvas-area {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: auto;
            margin: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: linear-gradient(135deg, #e6f7ff 0%, #c4e2f0 100%);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        /* Mensaje emergente estilo carta */
        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .message-card {
            background: linear-gradient(135deg, #fff9e8, #fff0cc);
            border-radius: 60px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            border: 3px solid #ffb347;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .message-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .message-overlay.active .message-card {
            transform: scale(1);
        }

        .message-card h2 {
            font-size: 2rem;
            color: #d48f2b;
            margin-bottom: 1rem;
            font-family: 'Dancing Script', cursive;
        }

        .typed-message {
            font-size: 1.3rem;
            color: #5a3e1b;
            margin: 1.5rem 0;
            line-height: 1.6;
            min-height: 120px;
            font-weight: 500;
        }

        .days-counter {
            background: #ffdd99;
            padding: 1rem;
            border-radius: 50px;
            margin: 1rem 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #b45f1b;
            font-family: monospace;
        }

        .close-message {
            background: #ffb347;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .close-message:hover {
            transform: scale(1.05);
            background: #ff9500;
        }

        /* Indicador de inicio */
        .start-prompt {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,215,0,0.9);
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            color: #5a3e1b;
            font-size: 1.1rem;
            animation: bounce 1s infinite;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(600px) rotate(180deg); }
        }

        /* Ocultar prompt cuando comienza la animación */
        .start-prompt.hide {
            display: none;
        }

        @media (max-width: 700px) {
            .typed-message { font-size: 1rem; }
            .message-card h2 { font-size: 1.5rem; }
            .days-counter { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="canvas-area">
        <canvas id="gardenCanvas" width="900" height="600" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/600"></canvas>
    </div>
    <div class="start-prompt" id="startPrompt">
        🌻 ¡Haz clic en la flor mágica para comenzar nuestro jardín! 🌻
    </div>
</div>

<div class="message-overlay" id="messageOverlay">
    <div class="message-card">
        <h2>💌 Para el amor de mi vida 💌</h2>
        <div class="typed-message" id="typedMessage"></div>
        <div class="days-counter" id="daysCounterDisplay"></div>
        <button class="close-message" onclick="closeMessage()">🌼 Continuar 🌼</button>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gardenCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900;
        canvas.height = 600;
        
        // Estados de la animación
        let animationState = 'waiting'; // waiting, growing, moving, raining
        let growthProgress = 0; // 0 a 1
        let moveProgress = 0; // 0 a 1
        let rainActive = false;
        let sunflowers = []; // girasoles (hojas)
        let rainDrops = [];
        let animationFrameId = null;
        let startTime = null;
        let moveStartTime = null;
        
        // Posiciones del árbol
        let treeX = 200; // posición inicial (raíz)
        let targetX = 580; // posición final después de moverse
        let currentTreeX = 200;
        
        // Flor inicial para hacer clic
        let clickFlower = {
            x: 450,
            y: 520,
            radius: 25,
            active: true
        };
        
        // Fecha de inicio: 5 de junio de 2023
        const startDate = new Date(2023, 5, 5, 0, 0, 0);
        
        // Calcular días transcurridos
        function getDaysTogether() {
            const now = new Date();
            const diffTime = Math.abs(now - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }
        
        // Actualizar contador de días
        function updateDaysCounter() {
            const days = getDaysTogether();
            return `${days} días juntos desde el 5 de junio de 2023 💛`;
        }
        
        // Dibujar la flor inicial (para hacer clic)
        function drawClickFlower() {
            if (!clickFlower.active) return;
            const fx = clickFlower.x;
            const fy = clickFlower.y;
            
            // Pétalos amarillos brillantes
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const px = fx + Math.cos(angle) * 22;
                const py = fy + Math.sin(angle) * 22;
                ctx.beginPath();
                ctx.ellipse(px, py, 12, 8, angle, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD966';
                ctx.fill();
                ctx.fillStyle = '#FFC107';
                ctx.beginPath();
                ctx.ellipse(px, py, 7, 5, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            // Centro
            ctx.beginPath();
            ctx.arc(fx, fy, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#F4A261';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(fx, fy, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#E76F51';
            ctx.fill();
            
            // Brillo
            ctx.beginPath();
            ctx.arc(fx - 3, fy - 3, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#FFF5B0';
            ctx.fill();
            
            // Animación de pulso
            const time = Date.now() / 300;
            const glow = Math.sin(time) * 5;
            ctx.shadowBlur = 15 + glow;
            ctx.shadowColor = '#ffaa33';
            ctx.beginPath();
            ctx.arc(fx, fy, 18, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,200,100,0.3)';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Dibujar el árbol según crecimiento
        function drawTree(growFactor, xPos) {
            const trunkHeight = 120 * growFactor;
            const trunkBaseY = 530;
            const trunkTopY = trunkBaseY - trunkHeight;
            
            // Tronco
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(xPos - 25, trunkTopY, 50, trunkHeight);
            ctx.fillStyle = '#6B3E1A';
            ctx.fillRect(xPos - 20, trunkTopY + 10, 40, trunkHeight - 10);
            
            if (growFactor > 0.2) {
                // Ramas y copa donde van los girasoles
                const branchFactor = Math.min(1, (growFactor - 0.2) / 0.8);
                const canopyRadius = 55 * branchFactor;
                const canopyY = trunkTopY - 15;
                
                // Copa verde
                ctx.fillStyle = '#5C9E3F';
                ctx.beginPath();
                ctx.ellipse(xPos, canopyY, canopyRadius, 45 * branchFactor, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#4C8C34';
                ctx.beginPath();
                ctx.ellipse(xPos - 15, canopyY - 10, 40 * branchFactor, 35 * branchFactor, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(xPos + 15, canopyY - 8, 42 * branchFactor, 36 * branchFactor, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Dibujar girasol (hoja del árbol)
        function drawSunflower(x, y, size = 14, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            // Pétalos
            for (let i = 0; i < 14; i++) {
                const angle = (i / 14) * Math.PI * 2;
                const px = Math.cos(angle) * size;
                const py = Math.sin(angle) * size;
                ctx.beginPath();
                ctx.ellipse(px, py, size * 0.65, size * 0.45, angle, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD93D';
                ctx.fill();
                ctx.fillStyle = '#FFC107';
                ctx.beginPath();
                ctx.ellipse(px, py, size * 0.4, size * 0.3, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            // Centro
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = '#C7791E';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = '#A55D1A';
            ctx.fill();
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.arc(Math.cos(i * Math.PI * 2 / 12) * 5, Math.sin(i * Math.PI * 2 / 12) * 5, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#F4A261';
                ctx.fill();
            }
            ctx.restore();
        }
        
        // Generar girasoles en el árbol según crecimiento
        function generateSunflowersOnTree(growFactor, xPos) {
            if (growFactor < 0.4) return [];
            const flowers = [];
            const count = Math.floor(15 + (growFactor - 0.4) * 35);
            const trunkTopY = 530 - (120 * growFactor);
            const canopyCenterY = trunkTopY - 20;
            
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let radius = 35 + Math.random() * 58;
                let fx = xPos + Math.cos(angle) * radius * (0.6 + Math.random() * 0.5);
                let fy = canopyCenterY - 5 + Math.sin(angle) * radius * 0.7 + (Math.random() * 20);
                if (fy > 490) fy = 480;
                if (fy < 380) fy = 390;
                let sizeFlower = 9 + Math.random() * 7;
                let rot = Math.random() * Math.PI * 2;
                flowers.push({ x: fx, y: fy, size: sizeFlower, rotation: rot });
            }
            return flowers;
        }
        
        // Dibujar fondo completo
        function drawBackground() {
            // Cielo gradiente
            const grad = ctx.createLinearGradient(0, 0, 0, 600);
            grad.addColorStop(0, '#FEEBC8');
            grad.addColorStop(1, '#E6F7D4');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Pasto
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, 530, canvas.width, 70);
            ctx.fillStyle = '#7CB342';
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 35, 530);
                ctx.lineTo(i * 35 + 12, 515);
                ctx.lineTo(i * 35 - 12, 515);
                ctx.fill();
            }
            // Nubes
            ctx.fillStyle = 'rgba(255,255,240,0.85)';
            ctx.beginPath();
            ctx.ellipse(120, 70, 50, 40, 0, 0, Math.PI*2);
            ctx.ellipse(180, 55, 45, 38, 0, 0, Math.PI*2);
            ctx.ellipse(70, 60, 42, 35, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(720, 90, 55, 42, 0, 0, Math.PI*2);
            ctx.ellipse(780, 75, 48, 40, 0, 0, Math.PI*2);
            ctx.fill();
        }
        
        // Dibujar lluvia de girasoles
        function drawRain() {
            for (let drop of rainDrops) {
                drawSunflower(drop.x, drop.y, drop.size, drop.rot);
                drop.y += drop.speed;
                drop.rot += 0.05;
            }
            rainDrops = rainDrops.filter(d => d.y < canvas.height + 50);
        }
        
        function startRain() {
            rainActive = true;
            for (let i = 0; i < 120; i++) {
                rainDrops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -300,
                    size: 6 + Math.random() * 9,
                    speed: 2 + Math.random() * 5,
                    rot: Math.random() * Math.PI * 2
                });
            }
        }
        
        // Animación de crecimiento
        function animateGrowth(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1500; // 1.5 segundos crecimiento
            growthProgress = Math.min(1, elapsed);
            
            currentTreeX = treeX;
            const currentFlowers = generateSunflowersOnTree(growthProgress, currentTreeX);
            sunflowers = currentFlowers;
            
            drawBackground();
            drawTree(growthProgress, currentTreeX);
            
            // Dibujar girasoles
            for (let fl of sunflowers) {
                drawSunflower(fl.x, fl.y, fl.size, fl.rotation);
            }
            
            if (clickFlower.active && growthProgress === 0) {
                drawClickFlower();
            }
            
            if (growthProgress >= 1 && animationState === 'growing') {
                // Terminó crecimiento, iniciar movimiento
                animationState = 'moving';
                moveStartTime = null;
                startMoveAnimation();
                return;
            }
            
            if (animationState === 'growing') {
                animationFrameId = requestAnimationFrame(animateGrowth);
            }
        }
        
        function startMoveAnimation() {
            const moveDuration = 1800;
            const moveStart = performance.now();
            
            function moveStep(now) {
                const moveElapsed = now - moveStart;
                moveProgress = Math.min(1, moveElapsed / moveDuration);
                currentTreeX = treeX + (targetX - treeX) * moveProgress;
                
                drawBackground();
                drawTree(1, currentTreeX);
                const movedFlowers = generateSunflowersOnTree(1, currentTreeX);
                for (let fl of movedFlowers) {
                    drawSunflower(fl.x, fl.y, fl.size, fl.rotation);
                }
                
                if (moveProgress >= 1) {
                    animationState = 'finished_move';
                    // Mostrar mensaje con efecto de escritura
                    showMessageWithTyping();
                    return;
                }
                requestAnimationFrame(moveStep);
            }
            requestAnimationFrame(moveStep);
        }
        
        // Mensaje con efecto de escritura
        let typingInterval;
        function showMessageWithTyping() {
            const overlay = document.getElementById('messageOverlay');
            const typedDiv = document.getElementById('typedMessage');
            const daysSpan = document.getElementById('daysCounterDisplay');
            
            const fullMessage = `🌻 Mi amor... 🌻\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! 💛\n\nNuestro amor florece como estos girasoles, cada día más hermoso.`;
            daysSpan.innerHTML = updateDaysCounter();
            
            overlay.classList.add('active');
            typedDiv.innerHTML = '';
            let i = 0;
            
            function typeWriter() {
                if (i < fullMessage.length) {
                    typedDiv.innerHTML += fullMessage.charAt(i);
                    i++;
                    setTimeout(typeWriter, 45);
                } else {
                    clearInterval(typingInterval);
                }
            }
            typeWriter();
            
            // Iniciar lluvia después de que aparezca el mensaje (5 segundos después de mostrar)
            setTimeout(() => {
                if (animationState !== 'raining') {
                    startRainAnimation();
                }
            }, 3800);
        }
        
        function startRainAnimation() {
            if (rainActive) return;
            animationState = 'raining';
            startRain();
            
            function rainLoop() {
                if (animationState !== 'raining') return;
                drawBackground();
                drawTree(1, targetX);
                const finalFlowers = generateSunflowersOnTree(1, targetX);
                for (let fl of finalFlowers) {
                    drawSunflower(fl.x, fl.y, fl.size, fl.rotation);
                }
                drawRain();
                requestAnimationFrame(rainLoop);
            }
            rainLoop();
        }
        
        function closeMessage() {
            document.getElementById('messageOverlay').classList.remove('active');
        }
        
        // Detectar clic en la flor inicial
        function handleCanvasClick(e) {
            if (animationState !== 'waiting') return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            
            if (clickFlower.active) {
                const dx = canvasX - clickFlower.x;
                const dy = canvasY - clickFlower.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < clickFlower.radius + 10) {
                    // Iniciar animación
                    clickFlower.active = false;
                    animationState = 'growing';
                    startTime = null;
                    document.getElementById('startPrompt').classList.add('hide');
                    animateGrowth(performance.now());
                }
            }
        }
        
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', handleCanvasClick);
        
        // Dibujo inicial (flor para hacer clic)
        function drawInitial() {
            drawBackground();
            drawTree(0, treeX);
            drawClickFlower();
            requestAnimationFrame(drawInitial);
        }
        
        window.closeMessage = closeMessage;
        drawInitial();
        
        // Actualizar contador en tiempo real cuando se vea
        setInterval(() => {
            if (document.getElementById('daysCounterDisplay').innerHTML) {
                document.getElementById('daysCounterDisplay').innerHTML = updateDaysCounter();
            }
        }, 1000);
        
    })();
</script>
</body>
</html>

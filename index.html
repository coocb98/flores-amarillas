<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Leidy 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#ff4da6, #ffcc66);
}

/* BOTÓN */
.start-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 25px;
    background: white;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    z-index: 3;
}

/* CARTA */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #fff8e7;
    padding: 25px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    transition: 0.8s;
    z-index: 2;
}

.card.show {
    transform: translate(-50%, -50%) scale(1);
}

/* TEXTO */
.text {
    font-size: 15px;
    text-align: left;
    min-height: 100px;
}

/* GIRASOL */
.sunflower {
    width: 12px;
    height: 12px;
    background: gold;
    border-radius: 50%;
    position: absolute;
    box-shadow: 0 0 6px orange;
}

.sunflower::after {
    content: "";
    width: 6px;
    height: 6px;
    background: brown;
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
}

/* GIRASOLES CAYENDO */
.fall {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 10px;
    background: gold;
    border-radius: 50%;
    animation: fall linear infinite;
}

.fall::after {
    content: "";
    width: 5px;
    height: 5px;
    background: brown;
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

/* BRILLOS */
.spark {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: spark 2s infinite;
}

@keyframes spark {
    0% {opacity:0;}
    50% {opacity:1;}
    100% {opacity:0;}
}

.timer {
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="start-btn" onclick="start()">🌻 Tocar 🌻</div>

<div class="card" id="card">
    <div class="text" id="text"></div>
    <div id="heart"></div>
    <div class="timer" id="timer"></div>
</div>

<audio id="music" loop>
    <source src="https://drive.google.com/file/d/1CUYCMWddQvGbxHArL5DUmTPDUpSHrHX6/view?usp=drive_link.mp3" type="audio/mp3">
</audio>

<script>
// INICIO
function start() {
    document.querySelector(".start-btn").style.display = "none";
    document.getElementById("card").classList.add("show");
    document.getElementById("music").play();
    typeText();
}

// TEXTO ANIMADO
const message = `Flores de girasol para Leidy Montejo 🌻
Si pudiera elegir un lugar seguro, sería a tu lado.
Cuanto más tiempo estoy contigo más te amo.
— I Love You —`;

let i = 0;
function typeText() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 40);
    }
}

// FORMA CORAZÓN
function heartShape(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return {x, y};
}

// GIRASOLES EN CORAZÓN
const heart = document.getElementById("heart");

for (let i = 0; i < 600; i++) {
    let t = Math.random() * Math.PI * 2;
    let pos = heartShape(t);

    let f = document.createElement("div");
    f.className = "sunflower";

    f.style.left = (150 + pos.x * 6) + "px";
    f.style.top = (120 - pos.y * 6) + "px";

    heart.appendChild(f);
}

// GIRASOLES CAYENDO
for (let i = 0; i < 70; i++) {
    let fall = document.createElement("div");
    fall.className = "fall";

    fall.style.left = Math.random() * 100 + "vw";
    fall.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(fall);
}

// BRILLOS
for (let i = 0; i < 40; i++) {
    let spark = document.createElement("div");
    spark.className = "spark";

    spark.style.left = Math.random() * 100 + "vw";
    spark.style.top = Math.random() * 100 + "vh";

    document.body.appendChild(spark);
}

// FECHA
const startDate = new Date("2023-06-05 00:00:00");

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    let minutes = Math.floor((diff / (1000 * 60)) % 60);
    let seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
        `${days} días ${hours}h ${minutes}m ${seconds}s juntos 💛`;
}

setInterval(updateTimer, 1000);
</script>

</body>
</html>
